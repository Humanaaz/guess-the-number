<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guessing Game</title>
  <style>
    body {
      background: linear-gradient(135deg, #74ebd5, #9face6);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .game-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
      animation: fadeIn 1s ease;
    }
    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #333;
    }
    p {
      margin: 8px 0;
      color: #555;
    }
    input {
      font-size: 16px;
      padding: 8px;
      width: 80%;
      border: 2px solid #87ceeb;
      border-radius: 6px;
      outline: none;
      transition: 0.3s;
    }
    input:focus {
      border-color: #4682b4;
    }
    button {
      margin-top: 12px;
      font-size: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    #submitBtn {
      background-color: #87ceeb;
      color: white;
    }
    #submitBtn:hover {
      background-color: #4682b4;
    }
    #playAgain {
      display: none;
      background-color: #32cd32;
      color: white;
    }
    #playAgain:hover {
      background-color: #228b22;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      min-height: 24px;
    }
    #attempts {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>

  <div class="game-container">
    <h1>💡 Guess the Number 💡</h1>
    <p>I have chosen a number between 1 and 100.</p>

    <input type="number" id="guessInput" placeholder="Enter your guess">
    <br>
    <button id="submitBtn" onclick="checkGuess()">Submit Guess</button>

    <p id="attempts">Attempts: 0</p>
    <p id="result"></p>

    <button id="playAgain" onclick="resetGame()">Play Again</button>
  </div>

  <script>
    let number = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function checkGuess() {
      const input = document.getElementById("guessInput");
      const result = document.getElementById("result");
      const attemptsLabel = document.getElementById("attempts");

      if (!input.value) {
        result.textContent = "⚠️ Enter a number first!";
        result.style.color = "orange";
        return;
      }

      const guess = parseInt(input.value);
      attempts++;

      if (guess === number) {
        result.textContent = `🎉 Correct!Congratulations You guessed in ${attempts} tries.`;
        result.style.color = "green";
        document.getElementById("playAgain").style.display = "inline-block";
        document.getElementById("submitBtn").disabled = true;
        input.disabled = true;
      } else if (guess < number) {
        result.textContent = "📉 Too low! Try again.";
        result.style.color = "blue";
      } else {
        result.textContent = "📈 Too high! Try again.";
        result.style.color = "red";
      }

      attemptsLabel.textContent = `Attempts: ${attempts}`;
    }

    function resetGame() {
      number = Math.floor(Math.random() * 100) + 1;
      attempts = 0;
      document.getElementById("result").textContent = "";
      document.getElementById("attempts").textContent = "Attempts: 0";
      document.getElementById("guessInput").value = "";
      document.getElementById("playAgain").style.display = "none";
      document.getElementById("submitBtn").disabled = false;
      document.getElementById("guessInput").disabled = false;
    }

    // Enter key support
    document.getElementById("guessInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        checkGuess();
      }
    });
  </script>

</body>
</html>
